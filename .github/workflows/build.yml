name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
          - goos: windows
            goarch: arm64
            runner: windows-latest
            ext: .exe
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
    runs-on: ${{ matrix.runner }}
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/bp_config_updater-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: bp_config_updater-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
